<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirect</title>

<script>
const ua = navigator.userAgent;

if (/iPhone|iPad|iPod/i.test(ua)) {
    window.location.replace("https://apps.apple.com/jp/app/idxxxxxxxx");
}
else if (/Android/i.test(ua)) {
    window.location.replace("https://play.google.com/store/apps/details?id=xxxxxxxx");
}
else {
    window.location.replace("https://www.google.com");
}
</script>

</head>
<body>
Redirecting...
</body>
