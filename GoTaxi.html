<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GO Taxi Redirect</title>

<script>
const ua = navigator.userAgent;

if (/iPhone|iPad|iPod/i.test(ua)) {
    window.location.replace(
        "https://apps.apple.com/us/app/go-taxi-app-for-japan/id1254341709"
    );
}
else if (/Android/i.test(ua)) {
    window.location.replace(
        "https://play.google.com/store/apps/details?id=com.dena.automotive.taxibell&hl=en"
    );
}
else {
    document.body.innerHTML =
        "<h2>Please open this QR code on a smartphone.</h2>";
}
</script>

</head>
<body>
Redirecting...
</body>
</html>
