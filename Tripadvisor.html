<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tripadvisor Redirect</title>

<script>
const ua = navigator.userAgent;

if (/iPhone|iPad|iPod/i.test(ua)) {
    window.location.replace(
        "https://apps.apple.com/us/app/tripadvisor-plan-book-trips/id284876795"
    );
}
else if (/Android/i.test(ua)) {
    window.location.replace(
        "https://play.google.com/store/apps/details?id=com.tripadvisor.tripadvisor&hl=en"
    );
}
else {
    document.body.innerHTML =
        "<h2>Please open this QR code on a smartphone.</h2>";
}
</script>

</head>
<body>
Redirecting...
</body>
</html>
