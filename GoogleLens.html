<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Google Lens Redirect</title>

<script>
const ua = navigator.userAgent;

if (/iPhone|iPad|iPod/i.test(ua)) {
    document.body.innerHTML =
        "<h2>Google Lens app is not available for iPhone.</h2>";
}
else if (/Android/i.test(ua)) {
    window.location.replace(
        "https://play.google.com/store/apps/details?id=com.google.ar.lens&hl=en"
    );
}
else {
    document.body.innerHTML =
        "<h2>Please open this QR code on a smartphone.</h2>";
}
</script>

</head>
<body>
Redirecting...
</body>
</html>
